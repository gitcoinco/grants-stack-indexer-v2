name: Build Image

on:
    workflow_call:

jobs:
    build-image:
        name: Build Image
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v3

            - name: Build Docker Image
              uses: docker/build-push-action@v3
              with:
                  context: .
                  target: processing
                  push: false
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
