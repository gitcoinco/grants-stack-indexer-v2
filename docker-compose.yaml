services:
    datalayer-postgres:
        image: postgres:16
        restart: always
        ports:
            - "${DATALAYER_POSTGRES_EXPOSED_PORT:-5432}:5432"
        volumes:
            - db_data:/var/lib/datalayer-postgresql/data
        env_file:
            - .env
        environment:
            POSTGRES_DB: ${DATALAYER_PG_DATABASE}
            POSTGRES_USER: ${DATALAYER_PG_USER}
            POSTGRES_PASSWORD: ${DATALAYER_POSTGRES_PASSWORD}
        networks:
            - datalayer
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DATALAYER_PG_USER}"]
            interval: 5s
            timeout: 5s
            retries: 5

    api-hasura:
        image: hasura/graphql-engine:latest
        ports:
            - "8082:8080"
        restart: always
        env_file:
            - .env
        environment:
            HASURA_GRAPHQL_DATABASE_URL: postgres://${DATALAYER_PG_USER}:${DATALAYER_POSTGRES_PASSWORD}@datalayer-postgres:5432/${DATALAYER_PG_DATABASE}
            HASURA_GRAPHQL_METADATA_DATABASE_URL: postgres://${DATALAYER_PG_USER}:${DATALAYER_POSTGRES_PASSWORD}@datalayer-postgres:5432/${DATALAYER_PG_DATABASE}
            HASURA_GRAPHQL_ENABLE_CONSOLE: ${DATALAYER_HASURA_ENABLE_CONSOLE:-true}
            HASURA_GRAPHQL_ADMIN_SECRET: ${DATALAYER_HASURA_ADMIN_SECRET:-secret}
            HASURA_GRAPHQL_UNAUTHORIZED_ROLE: ${DATALAYER_HASURA_UNAUTHORIZED_ROLE:-public}
            HASURA_GRAPHQL_CORS_DOMAIN: ${DATALAYER_HASURA_CORS_DOMAIN:-*}
            HASURA_GRAPHQL_ENABLE_TELEMETRY: ${DATALAYER_HASURA_ENABLE_TELEMETRY:-false}
            HASURA_GRAPHQL_EXPERIMENTAL_FEATURES: bigquery_string_numeric_input
            HASURA_GRAPHQL_BIGQUERY_STRING_NUMERIC_INPUT: true
            # HASURA_GRAPHQL_METADATA_DATABASE_EXTENSIONS_SCHEMA: ${DATALAYER_HASURA_METADATA_DATABASE_EXTENSIONS_SCHEMA:-chain_data_schema_1}
            ## enable debugging mode. It is recommended to disable this in production
            HASURA_GRAPHQL_DEV_MODE: ${DATALAYER_HASURA_DEV_MODE:-true}
            HASURA_GRAPHQL_ENABLED_LOG_TYPES: "startup, http-log, webhook-log, websocket-log, query-log"
            HASURA_GRAPHQL_ENABLED_APIS: "graphql,metrics"
            HASURA_GRAPHQL_ADMIN_INTERNAL_ERRORS: "true"
            ## uncomment next line to run console offline (i.e load console assets from server instead of CDN)
            # HASURA_GRAPHQL_CONSOLE_ASSETS_DIR: /srv/console-assets
        depends_on:
            datalayer-postgres:
                condition: service_healthy
        healthcheck:
            test: timeout 1s bash -c ':> /dev/tcp/127.0.0.1/8080' || exit 1
            interval: 5s
            timeout: 2s
            retries: 50
            start_period: 5s
        networks:
            - datalayer

    envio-postgres:
        image: postgres:16
        restart: always
        ports:
            - "${ENVIO_POSTGRES_EXPOSED_PORT:-5433}:5432"
        volumes:
            - db_data:/var/lib/envio-postgresql/data
        env_file:
            - .env
        environment:
            POSTGRES_DB: ${ENVIO_PG_DATABASE}
            POSTGRES_USER: ${ENVIO_PG_USER}
            POSTGRES_PASSWORD: ${ENVIO_POSTGRES_PASSWORD}
        networks:
            - indexer-service
    graphql-engine:
        image: hasura/graphql-engine:v2.23.0
        ports:
            - "${HASURA_EXPOSED_PORT:-8080}:${PORT:-8080}"
        user: 1001:1001
        depends_on:
            - "envio-postgres"
        restart: always
        env_file:
            - .env
        healthcheck:
            test: timeout 1s bash -c ':> /dev/tcp/127.0.0.1/8080' || exit 1
            interval: 5s
            timeout: 2s
            retries: 50
            start_period: 5s
        networks:
            - indexer-service
    indexer-service:
        build:
            context: ./apps/indexer
            dockerfile: Dockerfile
        depends_on:
            - "envio-postgres"
            - "graphql-engine"
        restart: always
        env_file:
            - .env
        networks:
            - indexer-service
volumes:
    db_data:
    ganache-data:
networks:
    indexer-service:
        name: indexer_test_network
    datalayer:
        name: datalayer_test_network
