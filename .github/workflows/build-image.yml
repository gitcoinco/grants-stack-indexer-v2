name: Build Image

on:
    workflow_call:

jobs:
    build-and-validate:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v2

            - name: Build Docker Image
              run: |
                  docker build \
                    --target=processing .
